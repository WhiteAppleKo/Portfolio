<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Document Viewer</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Highlight.js GitHub Dark Theme CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  
  <!-- Markdown & Diagram & Syntax Highlighting Libraries (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>

  <style>
    /* ── 디자인 토큰 & 초기화 ── */
    :root {
      --bg-dark: #FFFFFF;
      --card-bg: #FFFFFF;
      --card-border: #E5E7EB;
      --text-main: #222222;
      --text-muted: #4B5563;
      --primary: #2563EB; /* Blue */
      --primary-glow: rgba(37, 99, 235, 0.05);
      --secondary: #4F46E5;
      --font-outfit: 'Outfit', 'Noto Sans KR', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 60%);
      color: var(--text-main);
      font-family: var(--font-outfit);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── 그리드 레이아웃: 사이드바 + 메인 본문 + 우측 목차 ── */
    .app-layout {
      display: grid;
      grid-template-columns: 280px 1fr 260px;
      min-height: 100vh;
    }

    /* ── 우측 고정 목차 사이드바 (Sticky) ── */
    aside.toc-sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
      background: #F9FAFB;
      border-left: 1px solid var(--card-border);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 90;
    }

    .toc-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toc-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
      line-height: 1.4;
      display: block;
      border-left: 2px solid transparent;
      padding-left: 10px;
    }

    .toc-link:hover {
      color: var(--primary);
      border-left-color: rgba(37, 99, 235, 0.2);
    }

    .toc-link.active {
      color: var(--primary);
      font-weight: 600;
      border-left-color: var(--primary);
    }

    .toc-link.depth-h3 {
      margin-left: 12px;
      font-size: 0.8rem;
    }

    /* ── 좌측 고정 사이드바 (Sticky) ── */
    aside.sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
      background: #F9FAFB;
      border-right: 1px solid var(--card-border);
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      z-index: 100;
    }

    .sidebar-header {
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 20px;
    }

    /* 홈 복귀 링크 */
    .home-link {
      display: inline-flex;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s;
      margin-bottom: 12px;
    }

    .home-link:hover {
      color: var(--primary);
    }

    .home-link svg {
      margin-right: 8px;
      transition: transform 0.3s;
    }

    .home-link:hover svg {
      transform: translateX(-4px);
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.01em;
      margin-top: 4px;
    }

    /* 내비게이션 링크 목록 */
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid transparent;
      background: rgba(0, 0, 0, 0.01);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
 
    .nav-item:hover {
      background: rgba(37, 99, 235, 0.05);
      color: var(--text-main);
      border-color: rgba(37, 99, 235, 0.15);
    }
 
    /* 활성화 상태 (Active) */
    .nav-item.active {
      background: rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.3);
      color: var(--primary);
      box-shadow: 0 4px 12px -5px rgba(37, 99, 235, 0.2);
    }
 
    .nav-item .nav-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
 
    .nav-item.active .nav-num {
      color: var(--secondary);
    }
 
    .nav-item .nav-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }

    /* ── 우측 메인 본문 영역 ── */
    main.document-content {
      padding: 60px 80px 100px 80px;
      overflow-y: auto;
    }

    .document-container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* 로딩 및 에러 상태 */
    .status-message {
      text-align: center;
      padding: 120px 0;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .error-message {
      color: #EF4444;
      font-weight: 600;
    }

    /* ── 마크다운 렌더링 스타일링 ── */
    #markdown-content {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #markdown-content h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 28px;
      line-height: 1.25;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 24px;
      background: linear-gradient(135deg, #111827 40%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #markdown-content h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 50px;
      margin-bottom: 20px;
      color: #111827;
      border-left: 4px solid var(--primary);
      padding-left: 14px;
    }

    #markdown-content h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 30px;
      margin-bottom: 12px;
      color: #111827;
    }

    #markdown-content p {
      color: var(--text-muted);
      margin-bottom: 20px;
      font-weight: 400;
    }

    #markdown-content strong {
      color: var(--primary);
      font-weight: 600;
    }

    #markdown-content ul, #markdown-content ol {
      margin-bottom: 24px;
      padding-left: 24px;
      color: var(--text-muted);
      font-weight: 400;
    }

    #markdown-content li {
      margin-bottom: 8px;
    }

    /* 인용구 / 콜아웃 */
    #markdown-content blockquote {
      background: rgba(37, 99, 235, 0.05);
      border-left: 4px solid var(--primary);
      border-radius: 0 12px 12px 0;
      padding: 20px;
      margin: 24px 0;
      color: var(--primary);
    }
    
    #markdown-content blockquote p {
      margin-bottom: 0;
      color: var(--primary);
      font-weight: 500;
    }

    /* 테이블 */
    #markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 30px 0;
      font-size: 0.95rem;
    }

    #markdown-content th {
      background: rgba(37, 99, 235, 0.04);
      color: var(--primary);
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      border-bottom: 2px solid rgba(37, 99, 235, 0.15);
    }

    #markdown-content td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      color: var(--text-muted);
      font-weight: 400;
    }

    /* 코드 및 pre 블록 */
    #markdown-content pre {
      background: #F9FAFB;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 24px 0;
    }

    #markdown-content code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: rgba(37, 99, 235, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--primary);
    }

    #markdown-content pre code {
      background: transparent;
      padding: 0;
      color: #1F2937;
      font-size: 0.9rem;
    }

    /* ── 다이어그램 ── */
    .mermaid {
      background: #FFFFFF;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      justify-content: center;
      margin: 30px 0;
      overflow-x: auto;
    }

    /* ── 트러블슈팅 박스 ── */
    .trouble-box {
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      margin: 24px 0;
    }

    /* ── 애니메이션 ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── 반응형 레이아웃 ── */
    @media (max-width: 1200px) {
      .app-layout {
        grid-template-columns: 280px 1fr;
      }
      aside.toc-sidebar {
        display: none;
      }
      .utility-toolbar {
        right: 24px; /* 목차가 없어지면 우상단 끝으로 복귀 */
      }
    }

    @media (max-width: 900px) {
      .app-layout {
        grid-template-columns: 1fr;
      }
      aside.toc-sidebar {
        display: none;
      }
      .utility-toolbar {
        right: 24px;
      }

      aside.sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--card-border);
        padding: 24px;
        gap: 16px;
      }

      .sidebar-header {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .nav-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }

      .nav-item {
        flex: 1 1 calc(50% - 8px);
        padding: 10px 14px;
      }

      main.document-content {
        padding: 40px 24px 80px 24px;
      }
    }

    /* 플로팅 유틸리티 툴바 */
    .utility-toolbar {
      position: fixed;
      top: 24px;
      right: 284px; /* 우측 목차(TOC) 너비 260px + 여백 24px 고려하여 목차 바로 왼쪽에 붙임 */
      display: flex;
      gap: 8px;
      z-index: 300;
      transition: right 0.3s ease;
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      background: #FFFFFF;
      border: 1px solid var(--card-border);
      border-radius: 30px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .toolbar-btn:hover {
      color: var(--primary);
      border-color: rgba(37, 99, 235, 0.3);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
      transform: translateY(-1px);
    }

    .toolbar-btn svg {
      margin-right: 6px;
    }

    /* ── 인쇄 전용 스타일 (PDF 내보내기용) ── */
    @media print {
      .utility-toolbar,
      aside.sidebar,
      aside.toc-sidebar {
        display: none !important;
      }

      .app-layout {
        display: block !important;
      }

      main.document-content {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
      }

      .document-container {
        max-width: 100% !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body>

  <div class="app-layout">
    
    <!-- 좌측 사이드바 (Navigation Index) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="home-link" id="btn-back-home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          목록으로 (Home)
        </a>
        <div class="sidebar-title" id="sidebar-main-title">포트폴리오 문서</div>
      </div>
      
      <nav class="nav-list" id="sidebar-nav-list">
        <a href="#1" class="nav-item" id="nav-link-1">
          <span class="nav-num">PROJECT #01</span>
          <span class="nav-title">크래프팅 시스템</span>
        </a>
        <a href="#2" class="nav-item" id="nav-link-2">
          <span class="nav-num">PROJECT #02</span>
          <span class="nav-title">[프로젝트 2]</span>
        </a>
        <a href="#3" class="nav-item" id="nav-link-3">
          <span class="nav-num">PROJECT #03</span>
          <span class="nav-title">[프로젝트 3]</span>
        </a>
        <a href="#4" class="nav-item" id="nav-link-4">
          <span class="nav-num">PROJECT #04</span>
          <span class="nav-title">[프로젝트 4]</span>
        </a>
      </nav>
    </aside>

    <!-- 플로팅 유틸리티 툴바 -->
    <div class="utility-toolbar">
      <button onclick="window.print()" class="toolbar-btn" title="PDF로 저장 / 인쇄">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        PDF 다운로드
      </button>
    </div>

    <!-- 우측 마크다운 문서 렌더링 본문 -->
    <main class="document-content">
      <div class="document-container">
        <div id="status" class="status-message">문서를 불러오는 중입니다...</div>
        <article id="markdown-content" class="markdown-body" style="display: none;"></article>
      </div>
    </main>

    <!-- 우측 고정 목차 사이드바 (TOC) -->
    <aside class="toc-sidebar" id="toc-sidebar" style="display: none;">
      <div class="toc-title">📌 목차</div>
      <div class="toc-list" id="toc-list"></div>
    </aside>

  </div>

  <script>
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('markdown-content');
    const navListEl = document.getElementById('sidebar-nav-list');

    // 해시값 파싱 및 검증 함수
    function getProjectNum() {
      const hash = window.location.hash; // 예: "#1"
      const num = hash ? parseInt(hash.substring(1), 10) : null;
      
      console.log("Parsed project hash parameter:", hash, "->", num);
      return num;
    }

    // 좌측 사이드바 active 상태 비주얼 동기화
    function updateActiveSidebar(num) {
      const navItems = navListEl.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        const itemHash = item.getAttribute('href'); // "#1", "#2" 등
        const itemNum = parseInt(itemHash.substring(1), 10);
        item.classList.toggle('active', itemNum === num);
      });
    }

    function showError(msg) {
      statusEl.innerHTML = `<span class="error-message">${msg}</span>`;
      statusEl.style.display = 'block';
      contentEl.style.display = 'none';
    }

    async function loadMarkdown(num) {
      const filePath = `./portfolio/project${num}/README.md`;

      try {
        const response = await fetch(filePath);
        if (!response.ok) {
          throw new Error("파일이 존재하지 않거나 읽을 수 없습니다.");
        }

        const mdText = await response.text();
        renderMarkdown(mdText);

      } catch (err) {
        showError(`문서 로드 실패: ${err.message}<br><br><small>로컬에서 더블클릭 실행 시 브라우저 CORS 정책으로 인해 차단될 수 있습니다. 로컬 웹 서버를 구동해주세요.</small>`);
      }
    }

    function renderMarkdown(text) {
      // Marked Parser 설정
      marked.use({
        gfm: true,
        breaks: true
      });

      // 마크다운 파싱 및 주입
      contentEl.innerHTML = marked.parse(text);
      
      // 상태 전환
      statusEl.style.display = 'none';
      contentEl.style.display = 'block';

      // 1. Mermaid 다이어그램 렌더링
      try {
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
        
        // 클래스가 .language-mermaid 인 코드 블록들을 찾아 mermaid div로 치환
        const codeEls = document.querySelectorAll('pre code.language-mermaid');
        codeEls.forEach((codeEl, index) => {
          const preEl = codeEl.parentElement;
          const mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.id = `mermaid-chart-${index}`;
          mermaidDiv.textContent = codeEl.textContent;
          preEl.replaceWith(mermaidDiv);
        });
        
        // 다이어그램 실시간 구동
        mermaid.run();
      } catch (e) {
        console.error("Mermaid initialization failed:", e);
      }

      // 2. Highlight.js 구문 강조 실행
      try {
        const codeBlocks = document.querySelectorAll('pre code:not(.language-mermaid)');
        codeBlocks.forEach((block) => {
          hljs.highlightElement(block);
        });
      } catch (e) {
        console.error("Highlight.js failed:", e);
      }

      // 3. 동적 목차 (TOC) 생성
      buildTOC();
    }

    // 동적 목차 (TOC) 생성 및 Scroll Spy 함수
    function buildTOC() {
      const tocSidebarEl = document.getElementById('toc-sidebar');
      const tocListEl = document.getElementById('toc-list');
      
      tocListEl.innerHTML = ''; // 초기화
      
      const headers = contentEl.querySelectorAll('h2, h3');
      if (headers.length === 0) {
        tocSidebarEl.style.display = 'none';
        return;
      }
      
      // 데스크톱 해상도일 경우 노출되도록 인라인 display 제거 (미디어쿼리 제어 작동 가능하게 함)
      tocSidebarEl.style.display = '';

      // Scroll Spy 감지용 IntersectionObserver 설정
      let activeObserver = window._tocObserver;
      if (activeObserver) {
        activeObserver.disconnect();
      }

      const observerOptions = {
        root: null,
        rootMargin: '-10% 0px -75% 0px',
        threshold: 0
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            const activeLink = tocListEl.querySelector(`[data-target="${id}"]`);
            if (activeLink) {
              tocListEl.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
              activeLink.classList.add('active');
            }
          }
        });
      }, observerOptions);

      window._tocObserver = observer;

      headers.forEach((header, index) => {
        const headerId = `toc-header-${index}`;
        header.id = headerId;
        
        const link = document.createElement('a');
        link.href = `#${headerId}`;
        link.className = 'toc-link';
        link.dataset.target = headerId;
        link.textContent = header.textContent.replace('▹', '').trim();
        
        if (header.tagName === 'H3') {
          link.classList.add('depth-h3');
        }
        
        // 부드러운 스크롤 이동 (아래에서부터 75% 높이 / 위에서부터 25% 영역에 정렬)
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const targetTop = header.getBoundingClientRect().top + window.pageYOffset;
          const offsetPosition = targetTop - (window.innerHeight * 0.25);
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        });

        tocListEl.appendChild(link);
        observer.observe(header);
      });
    }

    // 각 프로젝트 마크다운에서 제목을 파싱하여 좌측 목차 명칭 동기화
    async function syncSidebarTitles() {
      const projects = [1, 2, 3, 4];
      
      projects.forEach(num => {
        const navItem = document.getElementById(`nav-link-${num}`);
        if (!navItem) return;
        
        const titleEl = navItem.querySelector('.nav-title');

        fetch(`./portfolio/project${num}/README.md`)
          .then(res => {
            if (!res.ok) throw new Error("Readme not found");
            return res.text();
          })
          .then(mdText => {
            const lines = mdText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            for (let line of lines) {
              if (line.startsWith("#")) {
                // 헤더 기호 제거 및 메타 구분 기호(—, -) 앞부분만 추출하여 간결화
                let parsedTitle = line.replace(/^#+\s*/, "").split(/[—|-]/)[0].trim();
                if (parsedTitle && titleEl) {
                  titleEl.textContent = parsedTitle;
                }
                break;
              }
            }
          })
          .catch(err => {
            console.log(`Project ${num} sidebar title skipped (Using placeholder):`, err.message);
          });
      });
    }

    // 라우팅 실행부
    function route() {
      const projectNum = getProjectNum();

      if (!projectNum || isNaN(projectNum) || projectNum < 1 || projectNum > 4) {
        showError("올바르지 않은 프로젝트 경로입니다.");
        updateActiveSidebar(null);
      } else {
        updateActiveSidebar(projectNum);
        loadMarkdown(projectNum);
      }
      // 문서 로딩 시 최상단 스크롤 초기화
      window.scrollTo(0, 0);
    }

    // 해시 변경 이벤트 감지 및 초기 실행
    window.addEventListener('hashchange', route);
    
    // 타이틀 연동 비동기 가동 후 라우팅 실행
    syncSidebarTitles();
    route();
  </script>

</body>
</html>
