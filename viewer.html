<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Document Viewer</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Highlight.js GitHub Dark Theme CSS (cdnjs) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  
  <!-- 공통 디자인 시스템 (theme.css) -->
  <link rel="stylesheet" href="theme.css">
  
  <!-- Markdown & Diagram & Syntax Highlighting Libraries (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>

  <style>
    /* ── viewer.html 전용 디자인 토큰 ── */
    /* theme.css와 중복 변수 제거 → theme.css가 단일 소스 */
    :root {
      /* theme.css 변수명과 다른 alias 연결 */
      --bg-dark: var(--bg-light);
      --font-outfit: var(--font-sans);

      /* viewer 전용 토큰 */
      --primary-glow: rgba(37, 99, 235, 0.05);

    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 60%);
      color: var(--text-main);
      font-family: var(--font-outfit);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── 그리드 레이아웃: 사이드바 + 메인 본문 + 우측 목차 ── */
    .app-layout {
      display: grid;
      grid-template-columns: 280px 1fr 260px;
      min-height: 100vh;
    }

    /* ── 우측 고정 목차 사이드바 (Sticky) ── */
    aside.toc-sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--card-border);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 90;
    }

    .toc-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toc-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
      line-height: 1.4;
      display: block;
      border-left: 2px solid transparent;
      padding-left: 10px;
    }

    .toc-link:hover {
      color: var(--primary);
      border-left-color: color-mix(in srgb, var(--primary) 20%, transparent);
    }

    .toc-link.active {
      color: var(--primary);
      font-weight: 600;
      border-left-color: var(--primary);
    }

    .toc-link.depth-h3 {
      margin-left: 12px;
      font-size: 0.8rem;
    }

    /* ── 우측 목차 아코디언 (Dynamic Collapse) ── */
    .toc-sub-group {
      display: none;
      transition: all 0.3s ease;
    }

    /* H2가 active이거나 자식 H3 중 active가 있을 때만 노출 */
    .toc-link.depth-h2.active + .toc-sub-group {
      display: block;
    }

    .toc-sub-group:has(.toc-link.active) {
      display: block;
    }

    /* ── 좌측 고정 사이드바 (Sticky) ── */
    aside.sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--card-border);
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      z-index: 100;
    }

    .sidebar-header {
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 20px;
    }

    /* 홈 복귀 링크 */
    .home-link {
      display: inline-flex;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s;
      margin-bottom: 12px;
    }

    .home-link:hover {
      color: var(--primary);
    }

    .home-link svg {
      margin-right: 8px;
      transition: transform 0.3s;
    }

    .home-link:hover svg {
      transform: translateX(-4px);
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.01em;
      margin-top: 4px;
    }

    /* 내비게이션 링크 목록 */
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid transparent;
      background: color-mix(in srgb, var(--text-main) 1%, transparent);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
 
    .nav-item:hover {
      background: color-mix(in srgb, var(--primary) 5%, transparent);
      color: var(--text-main);
      border-color: color-mix(in srgb, var(--primary) 15%, transparent);
    }
 
    /* 활성화 상태 (Active) */
    .nav-item.active {
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      border-color: color-mix(in srgb, var(--primary) 30%, transparent);
      color: var(--primary);
      box-shadow: 0 4px 12px -5px color-mix(in srgb, var(--primary) 20%, transparent);
    }
 
    .nav-item .nav-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
 
    .nav-item.active .nav-num {
      color: var(--secondary);
    }
 
    .nav-item .nav-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }

    /* ── 우측 메인 본문 영역 ── */
    main.document-content {
      padding: 60px 80px 100px 80px;
      overflow-y: auto;
    }

    .document-container {
      max-width: var(--container-width, 860px); /* 기본값: theme.css에서 --container-width 미설정 시 700px */
      margin: 0 auto;
    }

    /* 로딩 및 에러 상태 */
    .status-message {
      text-align: center;
      padding: 120px 0;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .error-message {
      color: var(--error-color);
      font-weight: 600;
    }

    /* ── 마크다운 렌더링 스타일링 ── */
    #markdown-content {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #markdown-content h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 28px;
      line-height: 1.25;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 24px;
      background: linear-gradient(135deg, var(--heading-color) 30%, var(--primary) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      width: fit-content;
    }

    #markdown-content h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 50px;
      margin-bottom: 20px;
      color: var(--heading-color);
      border-left: 4px solid var(--primary);
      padding-left: 14px;
    }

    #markdown-content h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 30px;
      margin-bottom: 12px;
      color: var(--heading-color);
    }

    #markdown-content p {
      color: var(--text-muted);
      margin-bottom: 20px;
      font-weight: 400;
    }

    #markdown-content strong {
      color: var(--primary);
      font-weight: 600;
    }

    #markdown-content ul, #markdown-content ol {
      margin-bottom: 24px;
      padding-left: 24px;
      color: var(--text-muted);
      font-weight: 400;
    }

    #markdown-content li {
      margin-bottom: 8px;
    }

    /* 인용구 / 콜아웃 */
    #markdown-content blockquote {
      background: color-mix(in srgb, var(--primary) 5%, transparent);
      border-left: 4px solid var(--primary);
      border-radius: 0 12px 12px 0;
      padding: 20px;
      margin: 24px 0;
      color: var(--primary);
    }
    
    #markdown-content blockquote p {
      margin-bottom: 0;
      color: var(--primary);
      font-weight: 500;
    }

    /* 테이블 */
    #markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 30px 0;
      font-size: 0.95rem;
    }

    #markdown-content th {
      background: color-mix(in srgb, var(--primary) 4%, transparent);
      color: var(--primary);
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      border-bottom: 2px solid color-mix(in srgb, var(--primary) 15%, transparent);
    }

    #markdown-content td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      color: var(--text-muted);
      font-weight: 400;
    }

    /* 코드 및 pre 블록 (다크 코딩 카드 튜닝) */
    #markdown-content pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 12px;
      padding: 18px 24px;
      overflow-x: auto;
      margin: 28px 0;
      box-shadow: 0 10px 30px -15px var(--code-shadow);
    }

    #markdown-content code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--code-inline-bg);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--primary);
    }

    #markdown-content pre code {
      background: transparent !important;
      padding: 0 !important;
      color: var(--code-text);
      font-size: 0.88rem;
      font-family: var(--font-mono) !important;
    }

    /* 다크 코드 블록 내의 주석 및 특정 강조 요소(strong, b) 형광 하이라이트 */
    #markdown-content pre code .hljs-comment {
      color: var(--code-comment) !important;
      font-style: italic;
    }

    #markdown-content pre code strong,
    #markdown-content pre code b,
    #markdown-content pre code span strong,
    #markdown-content pre code .hljs-comment strong {
      color: var(--code-highlight) !important;
      font-weight: 700 !important;
      text-shadow: 0 0 8px var(--code-highlight-glow);
    }

    /* 텍스트-이미지 좌우 그리드 */
    #markdown-content .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 36px;
      align-items: center;
      margin: 28px 0;
    }

    #markdown-content .content-grid.horizontal {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 36px;
      align-items: start;
    }

    #markdown-content .content-grid.vertical {
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
      width: 100%;
    }

    #markdown-content .content-grid.vertical > div {
      width: 100%;
    }

    @media (max-width: 900px) {
      #markdown-content .content-grid,
      #markdown-content .content-grid.horizontal {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    /* 이미지 카드 디자인 */
    #markdown-content .image-card {
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.06);
      background: var(--card-image-bg);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      margin: 20px 0;
    }

    #markdown-content .image-card:hover {
      transform: scale(1.02) translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
      cursor: zoom-in;
    }

    #markdown-content .image-card img {
      width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 !important;
      border: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    #markdown-content .image-caption {
      text-align: center;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--caption-bg);
      border-top: 1px solid var(--card-border);
      font-weight: 600;
      margin: 0;
    }

    /* 메타 정보 3열 카드형 그리드 */
    #markdown-content .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 24px 0 32px 0;
    }

    #markdown-content .meta-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04);
    }

    #markdown-content .meta-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      font-weight: 600;
    }

    #markdown-content .meta-val {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-main);
    }

    /* 돋보기 렌즈 마스크 컨테이너 */
    #markdown-content .magnifier-mask {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      display: block;
      margin: 28px auto;
      max-width: min(720px, 100%);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04);
      background: var(--card-bg);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #markdown-content .magnifier-mask:hover {
      border-color: var(--primary);
      box-shadow: 0 16px 36px color-mix(in srgb, var(--primary) 12%, transparent);
    }

    #markdown-content .magnifier-target {
      width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 !important;
      border: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      transition: transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
      cursor: zoom-in;
    }

    /* 마우스 호버 시 기본 확대 효과는 JS 인라인 제어로 이관됨 */

    #markdown-content .mermaid {
      background: var(--card-bg) !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    /* 특정 머메이드 다이어그램 배율 확대 (.mermaid-xl 클래스 래퍼에 적용) */
    #markdown-content .mermaid-xl {
      overflow-x: auto;
    }

    #markdown-content .mermaid-xl .mermaid {
      transform: scale(var(--mermaid-xl-scale, 1.5));
      transform-origin: top left;
      width: calc(100% / var(--mermaid-xl-scale, 1.5));
    }

    /* 플로팅 돋보기 휠 스케일 툴팁 */
    .zoom-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--tooltip-bg);
      color: var(--tooltip-text);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      z-index: 9999;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      border: 1px solid var(--tooltip-border);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      opacity: 0;
      white-space: nowrap;
      transform: translate(-50%, 0);
    }

    .zoom-tooltip.visible {
      opacity: 1;
      transform: translate(-50%, 4px);
    }

    /* 본문 이미지 호버 팝업 스타일 */
    #markdown-content .hover-image:not(.image-card-text) {
      color: var(--primary);
      text-decoration: underline dashed color-mix(in srgb, var(--primary) 50%, transparent);
      text-underline-offset: 4px;
      cursor: help;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    #markdown-content .hover-image:not(.image-card-text):hover {
      color: var(--secondary);
      text-decoration-color: var(--secondary);
    }

    /* 카드형 텍스트 박스 스타일 */
    #markdown-content .image-card-text {
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.04);
      background: var(--card-image-bg);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      margin: 20px 0;
      cursor: help;
    }

    #markdown-content .image-card-text:hover {
      transform: scale(1.01) translateY(-2px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
    }

    #markdown-content .image-card-text p {
      margin-bottom: 0 !important;
      color: var(--text-main) !important;
      font-weight: 500 !important;
    }

    .hover-image-popup {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      background: color-mix(in srgb, var(--card-bg) 95%, transparent);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      max-width: 380px;
      opacity: 0;
      transform: scale(0.95) translateY(10px);
      transition: opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hover-image-popup.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .hover-image-popup.pinned {
      border-color: var(--primary);
      box-shadow: 0 20px 45px -10px color-mix(in srgb, var(--primary) 30%, transparent);
    }

    .hover-image-popup img,
    .hover-image-popup video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      border: 1px solid var(--card-border);
    }

    /* ── 가로 배치 이미지 그리드 명시도 오버라이딩 ── */
    #markdown-content .image-row {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: wrap !important;
      gap: 16px !important;
      justify-content: center !important;
      align-items: center !important;
      margin: 28px 0 !important;
      width: 100% !important;
    }

    #markdown-content .image-row img {
      display: inline-block !important;
      margin: 0 !important;
    }

    #markdown-content .image-row.cols-2 img {
      max-width: calc(50% - 8px) !important;
    }

    #markdown-content .image-row.cols-3 img {
      max-width: calc(33.33% - 11px) !important;
    }

    #markdown-content .image-row.cols-4 img {
      max-width: calc(25% - 12px) !important;
    }

    /* 비율 및 높이 강제 통일 모드 (가로 배치용) */
    #markdown-content .image-row.uniform img {
      height: 240px !important;
      object-fit: cover !important;
    }

    /* ── 세로 배치 연속 이미지 그리드 명시도 오버라이딩 ── */
    #markdown-content .image-column {
      display: flex !important;
      flex-direction: column !important;
      gap: 16px !important;
      align-items: center !important;
      margin: 28px 0 !important;
      width: 100% !important;
    }

    #markdown-content .image-column img {
      display: block !important;
      width: 100% !important;
      max-width: min(600px, 100%) !important;
      margin: 0 !important;
    }

    /* 비율 및 높이 강제 통일 모드 (세로 배치용) */
    #markdown-content .image-column.uniform img {
      height: 320px !important;
      object-fit: cover !important;
    }

    /* ── 다이어그램 ── */
    .mermaid {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 30px;
      display: flex;
      justify-content: center;
      margin: 30px 0;
      overflow-x: auto;
    }

    /* ── 트러블슈팅 박스 ── */
    .trouble-box {
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      margin: 24px 0;
    }

    /* ── 애니메이션 ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── 반응형 레이아웃 ── */
    @media (max-width: 1200px) {
      .app-layout {
        grid-template-columns: 280px 1fr;

      aside.toc-sidebar {
        display: none;
      }
      .utility-toolbar {
        right: 24px; /* 목차가 없어지면 우상단 끝으로 복귀 */
      }
    }

    @media (max-width: 900px) {
      .app-layout {
        grid-template-columns: 1fr;
      }
      aside.toc-sidebar {
        display: none;
      }
      .utility-toolbar {
        right: 24px;
      }

      aside.sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--card-border);
        padding: 24px;
        gap: 16px;

      .sidebar-header {

        flex-wrap: wrap;

        flex: 1 1 calc(50% - 8px);
        padding: 10px 14px;
      }

      main.document-content {
        padding: 40px 24px 80px 24px;
      }

    /* 플로팅 유틸리티 툴바 */
    .utility-toolbar {
      position: fixed;
      top: 24px;
      right: 284px; /* 우측 목차(TOC) 너비 260px + 여백 24px 고려하여 목차 바로 왼쪽에 붙임 */
      display: flex;
      gap: 8px;
      z-index: 300;

    .toolbar-btn {

      align-items: center;

      border: 1px solid var(--card-border);

    .toolbar-btn:hover {

      box-shadow: 0 10px 15px -3px color-mix(in srgb, var(--primary) 10%, transparent);
      transform: translateY(-1px);

    .toolbar-btn svg {

    }

    /* ── 인쇄 전용 스타일 (PDF 내보내기용) ── */
    @media print {
      .utility-toolbar,
      aside.sidebar,
      aside.toc-sidebar {
        display: none !important;
      }

      .app-layout {
        display: block !important;
      }

      main.document-content {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
      }

      .document-container {
        max-width: 100% !important;
        padding: 0 !important;
      }
    }

  <script>
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('markdown-content');
    const navListEl = document.getElementById('sidebar-nav-list');

    // 해시값 파싱 및 검증 함수
    function getProjectNum() {
      const hash = window.location.hash; // 예: "#1"
      const num = hash ? parseInt(hash.substring(1), 10) : null;
      
      console.log("Parsed project hash parameter:", hash, "->", num);
      return num;
    }

    // 좌측 사이드바 active 상태 비주얼 동기화
    function updateActiveSidebar(num) {
      const navItems = navListEl.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        const itemHash = item.getAttribute('href'); // "#1", "#2" 등
        const itemNum = parseInt(itemHash.substring(1), 10);
        item.classList.toggle('active', itemNum === num);
      });
    }

    function showError(msg) {
      statusEl.innerHTML = `<span class="error-message">${msg}</span>`;
      statusEl.style.display = 'block';
      contentEl.style.display = 'none';
    }

    async function loadMarkdown(num) {
      const filePath = `./portfolio/project${num}/README.md?t=${new Date().getTime()}`;

      try {
        const response = await fetch(filePath);
        if (!response.ok) {
          throw new Error("파일이 존재하지 않거나 읽을 수 없습니다.");
        }

        const mdText = await response.text();
        
        // 동적 툴바 링크 파싱 및 바인딩
        const githubMatch = mdText.match(/<!--\s*link-github:\s*(.*?)\s*-->/);
        const videoMatch = mdText.match(/<!--\s*link-video:\s*(.*?)\s*-->/);

        const btnGithub = document.getElementById('btn-github-link');
        const btnVideo = document.getElementById('btn-video-link');

        if (githubMatch && githubMatch[1] && githubMatch[1].trim() !== "#" && githubMatch[1].trim().length > 0) {
          btnGithub.href = githubMatch[1].trim();
          btnGithub.style.display = 'inline-flex';
        } else {
          btnGithub.style.display = 'none';
        }

        if (videoMatch && videoMatch[1] && videoMatch[1].trim() !== "#" && videoMatch[1].trim().length > 0) {
          btnVideo.href = videoMatch[1].trim();
          btnVideo.style.display = 'inline-flex';
        } else {
          btnVideo.style.display = 'none';
        }

        renderMarkdown(mdText);

      } catch (err) {
        showError(`문서 로드 실패: ${err.message}<br><br><small>로컬에서 더블클릭 실행 시 브라우저 CORS 정책으로 인해 차단될 수 있습니다. 로컬 웹 서버를 구동해주세요.</small>`);
      }
    }

    function renderMarkdown(text) {
      // 1. Marked Custom Renderer 정의 (문자열 수준 컴파일 가동)
      const renderer = new marked.Renderer();
      
      renderer.code = function({ text: codeText, lang }) {
        if (lang === 'mermaid') {
          // Mermaid 블록은 컴파일을 생략하고 디렉토리 렌더러로 우회
          return `<pre><code class="language-mermaid">${codeText}</code></pre>`;
        }

        // 1단계: 순수 소스코드 텍스트 내의 **강조**를 알파벳 대문자 마커로 선치환
        let processedCode = codeText.replace(/\*\*(.*?)\*\*/g, 'STSTART$1STEND');
        // 1.5단계: 코드 시작부 또는 주석(//) 뒤의 넘버링(숫자 + 마침표 + 공백)을 감지하여 마커로 선치환
        processedCode = processedCode.replace(/(^|\n)(\s*|\s*\/\/\s*)(\d+)\.\s/g, '$1$2NUMSTART$3NUMEND ');

        // 2단계: Highlight.js 자바스크립트 인메모리 컴파일 구동 (구버전/신버전 API 예외 안전망 구축)
        let highlighted;
        try {
          if (lang && hljs.getLanguage(lang)) {
            try {
              highlighted = hljs.highlight(processedCode, { language: lang }).value;
            } catch (err) {
              highlighted = hljs.highlight(lang, processedCode).value;
            }
          } else {
            highlighted = hljs.highlightAuto(processedCode).value;
          }
        } catch (e) {
          console.error("Highlight.js failed to highlight code block:", e);
          highlighted = processedCode;
        }

        // 3단계: 구문 컴파일 완료된 HTML 문자열 내 마커를 strong 및 span 태그로 최종 복원
        highlighted = highlighted.replace(/STSTART/g, '<strong>').replace(/STEND/g, '</strong>');
        highlighted = highlighted.replace(/NUMSTART/g, '<span class="code-number-highlight">').replace(/NUMEND/g, '.</span>');

        // 최종 안전하게 완성된 코드 블록 HTML 반환
        return `<pre><code class="hljs ${lang ? 'language-' + lang : ''}">${highlighted}</code></pre>`;
      };

      // 2. Marked Parser 설정에 커스텀 렌더러 주입
      marked.use({
        renderer: renderer,
        gfm: true,
        breaks: true
      });

      // 마크다운 파싱 및 본문 주입
      contentEl.innerHTML = marked.parse(text);
      
      // 상태 전환
      statusEl.style.display = 'none';
      contentEl.style.display = 'block';

      // 3. Mermaid 다이어그램 실시간 구동
      try {
        mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
        
        const codeEls = document.querySelectorAll('pre code.language-mermaid');
        codeEls.forEach((codeEl, index) => {
          const preEl = codeEl.parentElement;
          const mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.id = `mermaid-chart-${index}`;
          mermaidDiv.textContent = codeEl.textContent;
          preEl.replaceWith(mermaidDiv);
        });
        
        mermaid.run();
      } catch (e) {
        console.error("Mermaid initialization failed:", e);
      }

      // 4. 동적 목차 (TOC) 생성
      buildTOC();

      // 5. 돋보기 렌즈 효과 활성화
      applyMagnifier();

      // 5.5. 텍스트 이미지 호버 팝업 활성화
      applyHoverImagePopup();

      // 6. 다이어그램과 이미지 동적 비율/높이 자동 정렬 구동
      setTimeout(() => {
        alignGridAspectRatios();
      }, 100);
    }

    // 돋보기 마스크 기하학적 2배 줌인 및 마우스 휠 동적 스케일 조절 적용 함수 (플로팅 툴팁 수치 동기화 탑재)
    function applyMagnifier() {
      // 1. 일반 마크다운 이미지 돋보기 바인딩
      const imgs = contentEl.querySelectorAll('img');
      imgs.forEach(img => {
        if (img.parentElement.classList.contains('magnifier-mask') || img.classList.contains('card-tag')) return;
        
        const mask = document.createElement('div');
        mask.className = 'magnifier-mask';
        
        img.replaceWith(mask);
        mask.appendChild(img);
        img.classList.add('magnifier-target');
        
        let currentScale = 1.0;
        let tooltipEl = null;
        
        let isDragging = false;
        let startX = 0, startY = 0;
        let offsetX = 0, offsetY = 0;
        
        mask.style.transformOrigin = 'center center';
        mask.style.cursor = 'grab';

        // 툴팁 외부 배치 위치 갱신 함수
        const updateTooltipPosition = () => {
          if (!tooltipEl) return;
          const rect = mask.getBoundingClientRect();
          const scrollY = window.pageYOffset || document.documentElement.scrollTop;
          const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
          tooltipEl.style.left = `${rect.left + scrollX + (rect.width / 2)}px`;
          tooltipEl.style.top = `${rect.bottom + scrollY + 8}px`;
        };

        // 드래그 개시
        mask.addEventListener('mousedown', (e) => {
          if (currentScale <= 1.0) return;
          isDragging = true;
          mask.style.cursor = 'grabbing';
          startX = e.clientX - offsetX;
          startY = e.clientY - offsetY;
          e.preventDefault();
        });

        // 드래그 무브 추적
        window.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          offsetX = e.clientX - startX;
          offsetY = e.clientY - startY;
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          updateTooltipPosition();
        });

        // 드래그 종료
        window.addEventListener('mouseup', () => {
          if (!isDragging) return;
          isDragging = false;
          mask.style.cursor = 'grab';
        });

        // 마우스 엔터: 호버 줌 개시 및 외부 플로팅 툴팁 생성
        mask.addEventListener('mouseenter', (e) => {
          mask.style.zIndex = '100';
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          
          tooltipEl = document.createElement('div');
          tooltipEl.className = 'zoom-tooltip';
          tooltipEl.innerHTML = `<span>↕️</span><span>휠 스크롤로 확대/축소 (${currentScale.toFixed(1)}배)</span>`;
          document.body.appendChild(tooltipEl);
          updateTooltipPosition();
          
          requestAnimationFrame(() => {
            if (tooltipEl) tooltipEl.classList.add('visible');
          });
        });

        // 마우스 휠: 동적 스케일 조절 (0.5배 ~ 3.0배 범위)
        mask.addEventListener('wheel', (e) => {
          e.preventDefault();
          
          if (e.deltaY < 0) {
            currentScale = Math.min(3.0, currentScale + 0.1);
          } else {
            currentScale = Math.max(0.5, currentScale - 0.1);
          }
          
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          updateTooltipPosition();
          
          if (tooltipEl) {
            tooltipEl.innerHTML = `<span>↕️</span><span>배율: ${currentScale.toFixed(1)}배</span>`;
          }
        }, { passive: false });

        // 마우스 리브: 스케일 원복 및 툴팁 파괴
        mask.addEventListener('mouseleave', () => {
          isDragging = false;
          mask.style.cursor = 'grab';
          currentScale = 1.0;
          offsetX = 0;
          offsetY = 0;
          mask.style.transform = '';
          mask.style.zIndex = '';
          
          if (tooltipEl) {
            const targetTooltip = tooltipEl;
            targetTooltip.classList.remove('visible');
            setTimeout(() => {
              targetTooltip.remove();
            }, 150);
            tooltipEl = null;
          }
        });
      });

      // 2. Mermaid 다이어그램 돋보기 바인딩
      const mermaids = contentEl.querySelectorAll('.mermaid');
      mermaids.forEach(mermaid => {
        if (mermaid.parentElement.classList.contains('magnifier-mask')) return;

        const mask = document.createElement('div');
        mask.className = 'magnifier-mask';
        mask.style.maxWidth = 'min(840px, 100%)';
        mask.style.margin = '28px auto';
        
        // 렌더링 레이스 컨디션 예방을 위해 비동기 딜레이 후 실측
        mask.style.width = '100%';
        setTimeout(() => {
          const svg = mermaid.querySelector('svg');
          if (svg) {
            let svgWidth = 0;
            if (svg.viewBox && svg.viewBox.baseVal) {
              svgWidth = svg.viewBox.baseVal.width;
            }
            if (!svgWidth || svgWidth <= 0) {
              svgWidth = svg.getBoundingClientRect().width;
            }
            if (svgWidth && svgWidth > 0) {
              mask.style.width = `${svgWidth + 60}px`;
            }
          }
        }, 50);
        
        mermaid.replaceWith(mask);
        mask.appendChild(mermaid);
        mermaid.classList.add('magnifier-target');

        let currentScale = 1.0;
        let tooltipEl = null;

        let isDragging = false;
        let startX = 0, startY = 0;
        let offsetX = 0, offsetY = 0;

        mask.style.transformOrigin = 'center center';
        mask.style.cursor = 'grab';

        const updateTooltipPosition = () => {
          if (!tooltipEl) return;
          const rect = mask.getBoundingClientRect();
          const scrollY = window.pageYOffset || document.documentElement.scrollTop;
          const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
          tooltipEl.style.left = `${rect.left + scrollX + (rect.width / 2)}px`;
          tooltipEl.style.top = `${rect.bottom + scrollY + 8}px`;
        };

        // 드래그 개시
        mask.addEventListener('mousedown', (e) => {
          if (currentScale <= 1.0) return;
          isDragging = true;
          mask.style.cursor = 'grabbing';
          startX = e.clientX - offsetX;
          startY = e.clientY - offsetY;
          e.preventDefault();
        });

        // 드래그 무브 추적
        window.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          offsetX = e.clientX - startX;
          offsetY = e.clientY - startY;
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          updateTooltipPosition();
        });

        // 드래그 종료
        window.addEventListener('mouseup', () => {
          if (!isDragging) return;
          isDragging = false;
          mask.style.cursor = 'grab';
        });

        mask.addEventListener('mouseenter', (e) => {
          mask.style.zIndex = '100';
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          
          tooltipEl = document.createElement('div');
          tooltipEl.className = 'zoom-tooltip';
          tooltipEl.innerHTML = `<span>↕️</span><span>휠 스크롤로 확대/축소 (${currentScale.toFixed(1)}배)</span>`;
          document.body.appendChild(tooltipEl);
          updateTooltipPosition();
          
          requestAnimationFrame(() => {
            if (tooltipEl) tooltipEl.classList.add('visible');
          });
        });

        mask.addEventListener('wheel', (e) => {
          e.preventDefault();
          
          if (e.deltaY < 0) {
            currentScale = Math.min(3.0, currentScale + 0.1);
          } else {
            currentScale = Math.max(0.5, currentScale - 0.1);
          }
          
          mask.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
          updateTooltipPosition();
          
          if (tooltipEl) {
            tooltipEl.innerHTML = `<span>↕️</span><span>배율: ${currentScale.toFixed(1)}배</span>`;
          }
        }, { passive: false });

        mask.addEventListener('mouseleave', () => {
          isDragging = false;
          mask.style.cursor = 'grab';
          currentScale = 1.0;
          offsetX = 0;
          offsetY = 0;
          mask.style.transform = '';
          mask.style.zIndex = '';
          
          if (tooltipEl) {
            const targetTooltip = tooltipEl;
            targetTooltip.classList.remove('visible');
            setTimeout(() => {
              targetTooltip.remove();
            }, 150);
            tooltipEl = null;
          }
        });
      });
    }

    // 텍스트 호버 시 이미지가 팝업되는 기믹 함수
    function applyHoverImagePopup() {
      let popup = document.getElementById('global-hover-image-popup');
      if (!popup) {
        popup = document.createElement('div');
        popup.id = 'global-hover-image-popup';
        popup.className = 'hover-image-popup';
        document.body.appendChild(popup);
      }

      let isPinned = false;
      let currentScale = 1.0;
      let closeTimeout = null;
      let isMouseOnTarget = false;
      let isMouseOnPopup = false;
      let hoverTooltipEl = null;

      let isDragging = false;
      let startX = 0, startY = 0;
      let offsetX = 0, offsetY = 0;

      // 팝업창 마우스 이벤트 감지
      popup.addEventListener('mouseenter', () => {
        isMouseOnPopup = true;
        if (closeTimeout) clearTimeout(closeTimeout);
      });

      popup.addEventListener('mouseleave', () => {
        isMouseOnPopup = false;
        triggerCloseCheck();
      });

      popup.addEventListener('mousedown', (e) => {
        if (!isPinned) return;
        isDragging = true;
        popup.style.cursor = 'grabbing';
        startX = e.clientX - offsetX;
        startY = e.clientY - offsetY;
        e.preventDefault();
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;
        popup.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
        positionTooltip();
      });

      window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        popup.style.cursor = isPinned ? 'grab' : 'default';
      });

      popup.style.cursor = 'default';

      popup.addEventListener('wheel', (e) => {
        if (!isPinned) return;
        e.preventDefault();
        if (e.deltaY < 0) {
          currentScale = Math.min(3.0, currentScale + 0.1);
        } else {
          currentScale = Math.max(0.5, currentScale - 0.1);
        }
        popup.style.transform = `scale(${currentScale}) translate(${offsetX / currentScale}px, ${offsetY / currentScale}px)`;
        popup.style.cursor = 'grab';
        positionTooltip();
        if (hoverTooltipEl) {
          hoverTooltipEl.innerHTML = `<span>↕️</span><span>배율: ${currentScale.toFixed(1)}배</span>`;
        }
      }, { passive: false });

      const targets = contentEl.querySelectorAll('.hover-image');
      targets.forEach(target => {
        const imgSrc = target.getAttribute('data-image');
        if (!imgSrc) return;

        target.addEventListener('mouseenter', (e) => {
          isMouseOnTarget = true;
          if (closeTimeout) clearTimeout(closeTimeout);

          // 안내 툴팁 생성
          if (!hoverTooltipEl) {
            hoverTooltipEl = document.createElement('div');
            hoverTooltipEl.className = 'zoom-tooltip';
            document.body.appendChild(hoverTooltipEl);
          }
          
          if (isPinned) return;

          currentScale = 1.0;
          offsetX = 0;
          offsetY = 0;
          popup.style.cursor = 'default';
          const srcList = imgSrc.split(',').map(s => s.trim());
          
          if (srcList.length > 1) {
            popup.style.maxWidth = 'none';
            popup.style.display = 'flex';
            popup.style.gap = '12px';
            
            popup.innerHTML = srcList.map(src => {
              const isVideo = src.toLowerCase().endsWith('.mp4');
              return isVideo 
                ? `<div style="flex: 0 0 auto; height: 280px;"><video src="${src}" autoplay loop muted playsinline style="height:100%; width:auto; display:block; border-radius:10px; border:1px solid var(--card-border);"></video></div>`
                : `<div style="flex: 0 0 auto; height: 280px;"><img src="${src}" alt="미리보기 이미지" style="height:100%; width:auto; display:block; border-radius:10px; border:1px solid var(--card-border);"></div>`;
            }).join('');
          } else {
            popup.style.maxWidth = '380px';
            popup.style.display = 'block';
            const isVideo = imgSrc.toLowerCase().endsWith('.mp4');
            if (isVideo) {
              popup.innerHTML = `<video src="${imgSrc}" autoplay loop muted playsinline></video>`;
            } else {
              popup.innerHTML = `<img src="${imgSrc}" alt="미리보기 이미지">`;
            }
          }
          popup.style.transform = `scale(${currentScale})`;
          popup.style.pointerEvents = 'none';
          popup.classList.add('visible');
          positionPopup(e);
          updateTooltipText();
          hoverTooltipEl.classList.add('visible');
          positionTooltip();
        });

        target.addEventListener('mousemove', (e) => {
          if (!isPinned) {
            positionPopup(e);
          }
          positionTooltip();
        });

        target.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          isPinned = !isPinned;
          updateTooltipText();
          
          if (isPinned) {
            popup.style.pointerEvents = 'auto';
            popup.classList.add('pinned');
            popup.style.cursor = 'grab';
          } else {
            popup.style.pointerEvents = 'none';
            popup.classList.remove('pinned');
            popup.style.cursor = 'default';
            offsetX = 0;
            offsetY = 0;
            positionPopup(e);
          }
          positionTooltip();
        });

        target.addEventListener('mouseleave', () => {
          isMouseOnTarget = false;
          triggerCloseCheck();
        });
      });

      function positionPopup(e) {
        const popupRect = popup.getBoundingClientRect();
        let left = e.clientX + 16;
        let top = e.clientY + 16;

        // 화면 영역 밖으로 밀려나는 현상 방지
        if (left + popupRect.width > window.innerWidth) {
          left = e.clientX - popupRect.width - 16;
        }
        if (top + popupRect.height > window.innerHeight) {
          top = e.clientY - popupRect.height - 16;
        }

        popup.style.left = `${left}px`;
        popup.style.top = `${top}px`;
      }

      function positionTooltip() {
        if (!hoverTooltipEl || !popup.classList.contains('visible')) return;
        const rect = popup.getBoundingClientRect();
        const scrollY = window.pageYOffset || document.documentElement.scrollTop;
        const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
        hoverTooltipEl.style.left = `${rect.left + scrollX + (rect.width / 2)}px`;
        hoverTooltipEl.style.top = `${rect.bottom + scrollY + 8}px`;
      }

      function updateTooltipText() {
        if (!hoverTooltipEl) return;
        hoverTooltipEl.innerHTML = isPinned 
          ? `<span>↕️</span><span>휠로 확대/축소</span>`
          : `<span>🖱️</span><span>클릭하여 고정</span>`;
      }

      function triggerCloseCheck() {
        if (closeTimeout) clearTimeout(closeTimeout);
        closeTimeout = setTimeout(() => {
          if (!isMouseOnTarget && !isMouseOnPopup) {
            closePopup();
          }
        }, 150);
      }

      function closePopup() {
        popup.classList.remove('visible');
        popup.classList.remove('pinned');
        popup.style.transform = '';
        popup.style.pointerEvents = 'none';
        popup.style.cursor = 'default';
        isPinned = false;
        isDragging = false;
        offsetX = 0;
        offsetY = 0;
        if (hoverTooltipEl) {
          hoverTooltipEl.classList.remove('visible');
        }
      }
    }

    // 다이어그램과 이미지의 원본 종횡비를 분석하여 가로 폭 비율과 높이를 동적 일치시키는 함수
    function alignGridAspectRatios() {
      const grids = document.querySelectorAll('.content-grid.horizontal');
      grids.forEach(grid => {
        const leftEl = grid.children[0];
        const rightEl = grid.children[1];
        if (!leftEl || !rightEl) return;

        // 우측 이미지의 원본 종횡비 구하기
        const img = rightEl.querySelector('img');
        if (!img) return;

        const calcRatio = () => {
          let r_i = img.naturalWidth / img.naturalHeight;
          if (!r_i || isNaN(r_i)) r_i = 1.0;

          // 좌측 머메이드 또는 요소의 종횡비 구하기
          let r_m = 1.0;
          const svg = leftEl.querySelector('.mermaid svg');
          if (svg) {
            const viewBox = svg.getAttribute('viewBox');
            if (viewBox) {
              const parts = viewBox.trim().split(/\s+/);
              if (parts.length >= 4) {
                const vbW = parseFloat(parts[2]);
                const vbH = parseFloat(parts[3]);
                if (vbW && vbH) r_m = vbW / vbH;
              }
            } else {
              r_m = svg.clientWidth / svg.clientHeight;
            }
          } else {
            r_m = leftEl.clientWidth / leftEl.clientHeight;
          }
          if (!r_m || isNaN(r_m)) r_m = 1.5;

          // 전체 사용 가능 너비 W 구하기
          const w = grid.clientWidth;
          if (!w) return;

          // 수학 공식에 따라 종횡비 합산 후 비율 도출
          const sum = r_m + r_i;
          const pctM = (r_m / sum) * 100;
          const pctI = (r_i / sum) * 100;

          // 그리드 템플릿 열 비율 동적 이식
          grid.style.gridTemplateColumns = `${pctM}% ${pctI}%`;
          grid.style.display = 'grid';
          grid.style.gap = '24px';

          // 높이를 h = W / (Rm + Ri) 로 완전 동기화 고정!
          const h = w / sum;
          
          // 양쪽 그리드 셀 자체의 높이는 가변적으로 자동 조절되게 유연화!
          leftEl.style.height = 'auto';
          rightEl.style.height = 'auto';
          
          // 좌측 머메이드 박스 자체의 세로 높이를 h로 완전 제어 고정!
          const mermaidDiv = leftEl.querySelector('.mermaid');
          if (mermaidDiv) {
            mermaidDiv.style.height = `${h}px`;
            mermaidDiv.style.padding = '0';
            mermaidDiv.style.margin = '0';
            mermaidDiv.style.boxSizing = 'border-box';
            mermaidDiv.style.display = 'flex';
            mermaidDiv.style.alignItems = 'center';
            mermaidDiv.style.justifyContent = 'center';
          }
          if (svg) {
            svg.style.height = '100%';
            svg.style.width = '100%';
          }
          
          // 우측 이미지 카드 자체의 세로 높이를 h로 완전 제어 고정!
          const imgCard = img.parentElement;
          if (imgCard && imgCard.classList.contains('image-card')) {
            imgCard.style.height = `${h}px`;
            imgCard.style.padding = '0';
            imgCard.style.margin = '0';
            imgCard.style.boxSizing = 'border-box';
            imgCard.style.display = 'flex';
            imgCard.style.alignItems = 'center';
            imgCard.style.justifyContent = 'center';
          }
          img.style.height = '100%';
          img.style.maxHeight = 'none';
          img.style.width = '100%';
          img.style.objectFit = 'contain';
        };

        if (img.complete) {
          calcRatio();
        } else {
          img.addEventListener('load', calcRatio);
        }
      });
      
      // 리사이즈 리스너 등록 (1회 보장)
      if (!window._gridResizeRegistered) {
        window.addEventListener('resize', () => {
          requestAnimationFrame(alignGridAspectRatios);
        });
        window._gridResizeRegistered = true;
      }
    }

    // 동적 목차 (TOC) 생성 및 Scroll Spy 함수
    function buildTOC() {
      const tocSidebarEl = document.getElementById('toc-sidebar');
      const tocListEl = document.getElementById('toc-list');
      
      tocListEl.innerHTML = ''; // 초기화
      
      const headers = contentEl.querySelectorAll('h2, h3');
      if (headers.length === 0) {
        tocSidebarEl.style.display = 'none';
        return;
      }
      
      // 데스크톱 해상도일 경우 노출되도록 인라인 display 제거 (미디어쿼리 제어 작동 가능하게 함)
      tocSidebarEl.style.display = '';

      // Scroll Spy 감지용 IntersectionObserver 설정
      let activeObserver = window._tocObserver;
      if (activeObserver) {
        activeObserver.disconnect();
      }

      const observerOptions = {
        root: null,
        rootMargin: '-10% 0px -75% 0px',
        threshold: 0
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            const activeLink = tocListEl.querySelector(`[data-target="${id}"]`);
            if (activeLink) {
              tocListEl.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
              activeLink.classList.add('active');
            }
          }
        });
      }, observerOptions);

      window._tocObserver = observer;

      let currentSubGroup = null;

      headers.forEach((header, index) => {
        const headerId = `toc-header-${index}`;
        header.id = headerId;
        
        const link = document.createElement('a');
        link.href = `#${headerId}`;
        link.className = 'toc-link';
        link.dataset.target = headerId;
        link.textContent = header.textContent.replace('▹', '').trim();
        
        if (header.tagName === 'H2') {
          link.classList.add('depth-h2');
          
          // H2가 생성되면 그 아래 H3 자식들을 모아둘 서브그룹 컨테이너 신설
          currentSubGroup = document.createElement('div');
          currentSubGroup.className = 'toc-sub-group';
        } else if (header.tagName === 'H3') {
          link.classList.add('depth-h3');
        }
        
        // 부드러운 스크롤 이동 (아래에서부터 75% 높이 / 위에서부터 25% 영역에 정렬)
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const targetTop = header.getBoundingClientRect().top + window.pageYOffset;
          const offsetPosition = targetTop - (window.innerHeight * 0.25);
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        });

        // H2는 목차 최상위에 직접 박고 직후 서브그룹 컨테이너를 함께 배치
        if (header.tagName === 'H2') {
          tocListEl.appendChild(link);
          if (currentSubGroup) {
            tocListEl.appendChild(currentSubGroup);
          }
        } else if (header.tagName === 'H3') {
          // H3는 현재 활성화된 H2 소속 서브그룹 내부 자식으로 주입
          if (currentSubGroup) {
            currentSubGroup.appendChild(link);
          } else {
            tocListEl.appendChild(link);
          }
        }
        
        observer.observe(header);
      });
    }

    // 각 프로젝트 마크다운에서 제목을 파싱하여 좌측 목차 명칭 동기화
    async function syncSidebarTitles() {
      const projects = [1, 2, 3, 4];
      
      projects.forEach(num => {
        const navItem = document.getElementById(`nav-link-${num}`);
        if (!navItem) return;
        
        const titleEl = navItem.querySelector('.nav-title');

        fetch(`./portfolio/project${num}/README.md`)
          .then(res => {
            if (!res.ok) throw new Error("Readme not found");
            return res.text();
          })
          .then(mdText => {
            const lines = mdText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            for (let line of lines) {
              if (line.startsWith("#")) {
                // 헤더 기호 제거 및 메타 구분 기호(—, -) 앞부분만 추출하여 간결화
                let parsedTitle = line.replace(/^#+\s*/, "").split(/[—|-]/)[0].trim();
                if (parsedTitle && titleEl) {
                  titleEl.textContent = parsedTitle;
                }
                break;
              }
            }
          })
          .catch(err => {
            console.log(`Project ${num} sidebar title skipped (Using placeholder):`, err.message);
          });
      });
    }

    // 라우팅 실행부
    function route() {
      const projectNum = getProjectNum();

      if (!projectNum || isNaN(projectNum) || projectNum < 1 || projectNum > 4) {
        showError("올바르지 않은 프로젝트 경로입니다.");
        updateActiveSidebar(null);
      } else {
        updateActiveSidebar(projectNum);
        loadMarkdown(projectNum);
      }
      // 문서 로딩 시 최상단 스크롤 초기화
      window.scrollTo(0, 0);
    }

    // 해시 변경 이벤트 감지 및 초기 실행
    window.addEventListener('hashchange', route);
    
    // 타이틀 연동 비동기 가동 후 라우팅 실행
    syncSidebarTitles();
    route();
  </script>
